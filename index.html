<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Olivetti Lens</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        .ui { position: absolute; bottom: 20px; left: 20px; right: 20px; z-index: 10; background: rgba(0,0,0,0.7); padding: 20px; border-radius: 20px; color: white; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
        .bar-bg { width: 100%; height: 8px; background: #333; border-radius: 4px; margin: 10px 0; overflow: hidden; }
        .bar-fill { height: 100%; width: 0%; transition: width 2s; }
        button { width: 100%; padding: 15px; border-radius: 10px; border: none; background: #0052A3; color: white; font-weight: bold; }
        #msg { display: none; color: #ff4d4d; font-size: 12px; margin-top: 10px; font-style: italic; }
    </style>
</head>
<body>
    <video id="v" autoplay playsinline muted></video>
    <div class="ui">
        <div id="status" style="color:#00ffcc; font-weight:bold; margin-bottom:10px;">SCANNER OLIVETTI v3.1</div>
        <small>ETICA</small><div class="bar-bg"><div id="b1" class="bar-fill" style="background:#E30613;"></div></div>
        <small>SPAZIO</small><div class="bar-bg"><div id="b2" class="bar-fill" style="background:#fff;"></div></div>
        <small>LUCE NATURALE</small><div class="bar-bg"><div id="b3" class="bar-fill" style="background:#00ffcc;"></div></div>
        <button id="btn" onclick="scan()">AVVIA ANALISI</button>
        <div id="msg">ERRORE: Ambiente non conforme. Luce artificiale rilevata.</div>
    </div>

    <script>
        const v = document.getElementById('v');
        
        // Funzione per avviare la camera
        async function start() {
            const constraints = { video: { facingMode: { exact: "environment" } }, audio: false };
            try {
                const s = await navigator.mediaDevices.getUserMedia(constraints);
                v.srcObject = s;
            } catch (e) {
                // Se la fotocamera posteriore fallisce, prova quella normale
                navigator.mediaDevices.getUserMedia({video: true}).then(s => v.srcObject = s);
            }
        }

        function scan() {
            document.getElementById('btn').innerText = "ANALISI...";
            setTimeout(() => {
                document.getElementById('b1').style.width = "25%";
                document.getElementById('b2').style.width = "35%";
                document.getElementById('b3').style.width = "10%";
                document.getElementById('status').innerText = "NON CONFORME";
                document.getElementById('msg').style.display = "block";
            }, 500);
        }

        window.onload = start;
    </script>
</body>
</html>
